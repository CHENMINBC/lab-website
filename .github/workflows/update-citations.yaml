name: update-citations
run-name: update citations

on:
  # DISABLED - Manual citation management
  workflow_call:
    inputs:
      open-pr:
        type: boolean
    outputs:
      changed:
        value: ${{ jobs.update-citations.outputs.changed }}

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_COLOR: true
  GOOGLE_SCHOLAR_API_KEY: ${{ secrets.GOOGLE_SCHOLAR_API_KEY }}

jobs:
  update-citations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: false  # DISABLED - Workflow will not run

    steps:
      - name: Workflow Disabled
        run: echo "This workflow is disabled for manual citation management"
